<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="carapace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c8ff8e"/>
      <stop offset="0.45" stop-color="#56c04b"/>
      <stop offset="1" stop-color="#1a6b2e"/>
    </linearGradient>
    <linearGradient id="chitin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9af37a"/>
      <stop offset="1" stop-color="#2c8a3a"/>
    </linearGradient>
  </defs>

  <!-- rear legs -->
  <path d="M13 30 4 34M14 26 3 27M15 22 5 19" stroke="#2b7b36" stroke-width="3" stroke-linecap="round"/>

  <!-- torso and shell (side view) -->
  <ellipse cx="22" cy="25" rx="11" ry="10" fill="url(#chitin)" stroke="#dcffd2" stroke-width="1.6"/>
  <path d="M15 25c0-8 7-14 16-12 4.2 1 7.4 3.7 8.6 7.5 1.2 3.8.1 7.7-3.2 10.8-4.3 4.1-11 4.8-16.7 2.2C16.8 32 15 28.8 15 25Z"
