  <!-- head + jaw -->
  <path d="M31 22c3.5-2.4 8.8-1.3 10.3 2.2 1.5 3.6-1 7.1-5.5 7.6-3 .4-5.8-.9-7.2-3.2"
    fill="#3e9f45" stroke="#d9ffd2" stroke-width="1.5"/>
  <path d="M35.5 28.5 43 31M34.8 25.6 42.7 24.6" stroke="#b8ff84" stroke-width="2.2" stroke-linecap="round"/>

  <!-- front scythe arm -->
  <path d="M30 30c4.3 2.5 6.6 5 9.5 9" stroke="#84ea70" stroke-width="3" stroke-linecap="round"/>

  <!-- spikes -->
  <path d="M19 15 17 10M23 14 23 8M27 14 30 9" stroke="#c7ff99" stroke-width="2" stroke-linecap="round"/>

  <!-- eye -->
  <circle cx="35" cy="23" r="2.2" fill="#0f2c17"/>
  <circle cx="35.6" cy="22.5" r="0.8" fill="#d7ffbe"/>

  <!-- shell streaks -->
  <path d="M19 20c2.7-1.9 6.6-2.4 10.2-1.1M18.5 26c3.8-1.8 8.4-1.8 12 0M19.2 31c3-.8 6.4-.5 9.2.8"
    stroke="#195f2a" stroke-width="1.6" stroke-linecap="round"/>
</svg>
